{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "shortly.fullname" . }}-ingress
  labels:
    {{- include "shortly.labels" . | nindent 4 }}
    component: ingress
  annotations:
    {{- if .Values.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    # ENTFERNT: rewrite-target hier - macht Probleme für /api und /
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        # TODO fix backend reachable
        paths:
          # API-Endpoints -> Backend
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "shortly.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          # Shortcode-Pattern: Exakt 6 alphanumerische Zeichen -> Backend
          - path: /([A-Za-z0-9]{6})$
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "shortly.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          # Alles andere -> Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "shortly.fullname" $ }}-frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
    {{- end }}
{{- end }}
