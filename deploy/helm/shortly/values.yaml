nameOverride: ""
fullnameOverride: ""

# -------------------------------------------------
# Angular Frontend
# -------------------------------------------------
frontend:
  enabled: true
  image:
    # Eigenes Frontend-Image mit Angular-Build und NGINX
    repository: projectregistry.neusta.de/limmoor/shortly/frontend
    tag: "0.0.9"
    pullPolicy: IfNotPresent
  imagePullSecrets: [ ]
  replicaCount: 1

  service:
    type: ClusterIP
    port: 80

  staticFiles:
    useConfigMap: false

  # Liveness/Readiness Probes
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  podAnnotations: { }
  nodeSelector: { }
  tolerations: [ ]
  affinity: { }

# -------------------------------------------------
# Spring Backend
# -------------------------------------------------
backend:
  enabled: true
  image:
    repository: projectregistry.neusta.de/limmoor/shortly/java
    tag: "0.0.9"
    pullPolicy: IfNotPresent
  imagePullSecrets: [ ]
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  # Umgebungsvariablen für Spring Boot
  env: [ ]
  # Redis host/port werden jetzt dynamisch in backend.yaml gesetzt

  # Liveness/Readiness Probes (Spring Boot Actuator)
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podAnnotations: { }
  nodeSelector: { }
  tolerations: [ ]
  affinity: { }

# -------------------------------------------------
# Ingress
# -------------------------------------------------
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
  hosts:
    - host: ""   # leer für localhost/Minikube; bei echter Domain hier eintragen
  tls: [ ]
  # Für Production mit TLS:
  # tls:
  #   - secretName: shortly-tls
  #     hosts:
  #       - shortly.example.com

# -------------------------------------------------
# Redis
# -------------------------------------------------
redis:
  enabled: true
  image:
    repository: docker-repository.intern.neusta.de/redis
    tag: 8-alpine
    pullPolicy: Never #workaround because i cant pull anywhere
  port: 6379

  # Für Production: Persistence aktivieren
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""  # Standard-StorageClass verwenden

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -------------------------------------------------
# Monitoring
# -------------------------------------------------
monitoring:
  annotationsScrape: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    additionalLabels:
      release: kube-prometheus-stack
    interval: 15s
    scrapeTimeout: 10s
