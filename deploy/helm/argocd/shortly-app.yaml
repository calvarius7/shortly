# deploy/argocd/shortly-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shortly
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Für lokale Entwicklung: Git-Repo URL hier eintragen
    # Beispiel: https://github.com/DEIN-USER/shortly.git
    # Für Docker Desktop lokal kannst du auch ein lokales Repo nutzen (siehe unten)
    repoURL: https://gitlab.neusta.de/limmoor/shortly.git
    targetRevision: HEAD
    path: deploy/helm/shortly

    helm:
      valueFiles:
        - values.yaml
      parameters:
        # Shortly App Image von GitLab Registry
        - name: image.repository
          value: projectregistry.neusta.de/limmoor/shortly
        - name: image.tag
          value: latest
        - name: image.pullPolicy
          value: Always
        
        # Redis vom Docker Hub
        - name: redis.image.repository
          value: redis
        - name: redis.image.tag
          value: "7-alpine"
        - name: redis.image.pullPolicy
          value: IfNotPresent
        
        # Service
        - name: service.type
          value: NodePort
        - name: service.nodePort
          value: "30080"
        
        # ServiceMonitor deaktivieren
        - name: monitoring.serviceMonitor.enabled
          value: "true"

  destination:
    # Docker Desktop K8s Cluster
    server: https://kubernetes.default.svc
    namespace: shortly

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
