# /etc/nginx/conf.d/default.conf
# Frontend-NGINX-Konfiguration für Shortly Angular SPA
# Shortcode-Routing erfolgt bereits über Kubernetes Ingress

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip-Komprimierung
  gzip on;
  gzip_types text/plain application/json application/javascript text/css application/xml application/xml+rss;
  gzip_min_length 1024;
  gzip_comp_level 6;

  # Security-Header (production-ready)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

  # Health-Check für Kubernetes Probes
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }

  # Statische Assets mit aggressivem Caching
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|webp)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # SPA-Fallback für alle anderen Pfade
  # Angular Router übernimmt die Client-seitige Navigation
  location / {
    try_files $uri $uri/ /index.html;

    # Index.html sollte nicht gecacht werden (immer aktuellste Version laden)
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      expires 0;
    }
  }
}
