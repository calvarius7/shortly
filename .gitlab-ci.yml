#  artifacts:
#    when: always
#    expire_in: 1 day
#    paths:
#      - target/checkstyle-result.xml
#      - target/checkstyle*.xml

quality-pmd:
  extends: .eco-ci-base
  stage: quality
  needs: [ "build" ]
  script:
    - ./mvnw $MAVEN_CLI_OPTS pmd:check
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - target/pmd.xml
      - target/site/pmd.html

quality-spotbugs:
  extends: .eco-ci-base
  stage: quality
  needs: [ "build" ]
  script:
    - ./mvnw $MAVEN_CLI_OPTS com.github.spotbugs:spotbugs-maven-plugin:check
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - target/spotbugsXml.xml
      - target/spotbugsHtml.html

quality-dependency-check:
  extends: .eco-ci-base
  stage: quality
  needs: [ "build" ]
  script:
    - ./mvnw $MAVEN_CLI_OPTS org.owasp:dependency-check-maven:aggregate -Dformat=ALL -DfailBuildOnCVSS=9 -DnvdApiKey=$NVD_PERSONAL
    - ./mvnw $MAVEN_CLI_OPTS cyclonedx:makeAggregateBom
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - target/dependency-check-report.*
      - target/bom.xml

quality-trivy:
  stage: quality
  image:
    name: aquasec/trivy:latest
    entrypoint: [ "" ]
  needs: [ "build" ]
  script:
    - trivy fs --no-progress --exit-code 1 --severity CRITICAL --format table .
    - trivy fs --no-progress --exit-code 0 --severity HIGH,CRITICAL --format sarif -o trivy.sarif .
    - trivy fs --no-progress --exit-code 0 --severity HIGH,CRITICAL --format json -o trivy.json .
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - trivy.sarif
      - trivy.json

# ---------- DEPLOY ----------

build-native-image:
  extends: .eco-ci-base
  stage: deploy
  needs: [ "unit-tests", "integration-tests" ]
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests spring-boot:build-image -Pnative -Dspring-boot.build-image.imageName=$SHORTLY_REGISTRY:$CI_COMMIT_SHORT_SHA
    - docker save $SHORTLY_REGISTRY:$CI_COMMIT_SHORT_SHA -o native-image.tar
  artifacts:
    expire_in: 1 day
    paths:
      - native-image.tar
  only:
    - tags

scan-native-image:
  stage: deploy
  image:
    name: aquasec/trivy:latest
    entrypoint: [ "" ]
  needs: [ "build-native-image" ]
  script:
    - trivy image --input native-image.tar --no-progress --exit-code 1 --severity CRITICAL --format table
    - trivy image --input native-image.tar --no-progress --exit-code 0 --severity HIGH,CRITICAL --format sarif -o trivy-image.sarif
    - trivy image --input native-image.tar --no-progress --exit-code 0 --severity HIGH,CRITICAL --format json -o trivy-image.json
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - trivy-image.sarif
      - trivy-image.json
  only:
    - tags

push-native-image:
  extends: .eco-ci-base
  stage: deploy
  needs: [ "scan-native-image", "build-native-image" ]
  script:
    - docker load -i native-image.tar
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker tag $SHORTLY_REGISTRY:$CI_COMMIT_SHORT_SHA $SHORTLY_REGISTRY:latest
    - docker tag $SHORTLY_REGISTRY:$CI_COMMIT_SHORT_SHA $SHORTLY_REGISTRY:$CI_COMMIT_TAG
    - docker push $SHORTLY_REGISTRY:$CI_COMMIT_SHORT_SHA
    - docker push $SHORTLY_REGISTRY:latest
    - docker push $SHORTLY_REGISTRY:$CI_COMMIT_TAG
  only:
    - tags
