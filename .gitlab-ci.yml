default:
  tags:
    - docker
  interruptible: true
  cache:
    - key: "m2_${CI_COMMIT_REF_SLUG}"
      fallback_keys:
        - "m2_${CI_DEFAULT_BRANCH}"
      paths:
        - .m2/repository

variables:
  SHORTLY_REGISTRY: "$CI_REGISTRY/limmoor/shortly"
  MAVEN_REPO_LOCAL: "$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--no-transfer-progress -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -B -V"

include:
  - remote: 'https://raw.githubusercontent.com/green-coding-solutions/eco-ci-energy-estimation/main/eco-ci-gitlab.yml'

stages:
  - build
  - test
  - quality
  - deploy


.eco-ci-base:
  image: eclipse-temurin:25-jdk-jammy
  variables:
    ECO_CI_SEND_DATA: "false"
    ECO_CI_CO2_GRID_INTENSITY_API_TOKEN: "HIfF0HcByBuFyyLHmGlO"
    ECO_CI_CO2_CALCULATION_METHOD: "location-based"
    ECO_CI_JSON_OUTPUT: "true"
  before_script:
    - apt-get update
    - apt-get install -y git jq curl
    - update-ca-certificates
    - !reference [ .start_measurement, script ]
    - mkdir -p .m2/repository
    - chmod +x ./mvnw
  after_script:
    - !reference [ .get_measurement, script ]
    - !reference [ .display_results, script ]

# ---------- BUILD ----------

build:
  extends: .eco-ci-base
  stage: build
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    expire_in: 1 day
    paths:
      - target/*.jar
      - target/classes

# ---------- TEST (parallel) ----------

unit-tests:
  extends: .eco-ci-base
  stage: test
  needs: [ "build" ]
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipITs=true verify
  artifacts:
    when: always
    expire_in: 1 day
    reports:
      junit:
        - target/surefire-reports/*.xml
      coverage_report:
        coverage_format: jacoco
        path: target/site/jacoco/jacoco.xml
    paths:
      - target/surefire-reports/*
      - target/*.jar
      - target/shortly

integration-tests:
  extends: .eco-ci-base
  stage: test
  needs: [ "build" ]
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DfailIfNoTests=false test-compile failsafe:integration-test failsafe:verify
  artifacts:
    when: always
    expire_in: 1 day
    reports:
      junit:
        - target/failsafe-reports/TEST-*.xml
    paths:
      - target/failsafe-reports/*

mutation-tests:
  extends: .eco-ci-base
  stage: test
  needs: [ "build" ]
  script:
    - ./mvnw $MAVEN_CLI_OPTS -Dpitest.failWhenNoMutations=false -DskipTests org.pitest:pitest-maven:mutationCoverage
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - target/pit-reports/**

# ---------- QUALITY (parallel) ----------

