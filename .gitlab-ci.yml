image: eclipse-temurin:25-jdk-jammy

default:
  tags:
    - docker
  interruptible: true
  cache:
    - key: "m2_${CI_COMMIT_REF_SLUG}"
      fallback_keys:
        - "m2_${CI_DEFAULT_BRANCH}"
      paths:
        - .m2/repository

variables:
  MAVEN_REPO_LOCAL: "$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--no-transfer-progress -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -B -V"

include:
  - remote: 'https://raw.githubusercontent.com/green-coding-solutions/eco-ci-energy-estimation/main/eco-ci-gitlab.yml'

stages:
  - build
  - test
  - quality
  - package

# ---------- BUILD ----------

build:
  stage: build
  before_script:
    - mkdir -p .m2/repository
    - chmod +x ./mvnw
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    expire_in: 1 day
    paths:
      - target/*.jar
      - target/classes

build-native-image:
  stage: package
  needs: [ "unit-tests", "integration-tests" ]
  before_script:
    - mkdir -p .m2/repository
    - chmod +x ./mvnw
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests spring-boot:build-image -Pnative -Dspring-boot.build-image.imageName=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - tags
# ---------- TEST (parallel) ----------

unit-tests:
  stage: test
  needs: [ "build" ]
  script:
    - chmod +x ./mvnw
    - ./mvnw $MAVEN_CLI_OPTS -DskipITs=true verify
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit:
        - target/surefire-reports/*.xml
      coverage_report:
        coverage_format: jacoco
        path: target/site/jacoco/jacoco.xml
    paths:
      - target/surefire-reports/*
      - target/*.jar
      - target/shortly

integration-tests:
  stage: test
  needs: [ "build" ]
  script:
    - chmod +x ./mvnw
    - ./mvnw $MAVEN_CLI_OPTS -DfailIfNoTests=false test-compile failsafe:integration-test failsafe:verify
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit:
        - target/failsafe-reports/TEST-*.xml
    paths:
      - target/failsafe-reports/*

mutation-tests:
  stage: test
  needs: [ "build" ]
  script:
    - chmod +x ./mvnw
    - ./mvnw $MAVEN_CLI_OPTS -Dpitest.failWhenNoMutations=false -DskipTests org.pitest:pitest-maven:mutationCoverage
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - target/pit-reports/**

# ---------- QUALITY (parallel) ----------

quality-checkstyle:
  stage: quality
  needs: [ "build" ]
  script:
    - chmod +x ./mvnw
    - ./mvnw $MAVEN_CLI_OPTS checkstyle:check
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - target/checkstyle-result.xml
      - target/checkstyle*.xml

quality-pmd:
  stage: quality
  needs: [ "build" ]
  script:
    - chmod +x ./mvnw
    - ./mvnw $MAVEN_CLI_OPTS pmd:check
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - target/pmd.xml
      - target/site/pmd.html

quality-spotbugs:
  stage: quality
  needs: [ "build" ]
  script:
    - chmod +x ./mvnw
    - ./mvnw $MAVEN_CLI_OPTS com.github.spotbugs:spotbugs-maven-plugin:check
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - target/spotbugsXml.xml
      - target/spotbugsHtml.html

quality-dependency-check:
  stage: quality
  needs: [ "build" ]
  script:
    - chmod +x ./mvnw
    - ./mvnw $MAVEN_CLI_OPTS org.owasp:dependency-check-maven:aggregate -Dformat=ALL -DfailBuildOnCVSS=7 -DnvdApiKey=$NVD_PERSONAL
    - ./mvnw $MAVEN_CLI_OPTS cyclonedx:makeAggregateBom
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - target/dependency-check-report.*
      - target/bom.xml

quality-trivy:
  stage: quality
  image:
    name: aquasec/trivy:latest
    entrypoint: [ "" ]
  needs: [ "build" ]
  script:
    - trivy fs --no-progress --exit-code 1 --severity CRITICAL --format table .
    - trivy fs --no-progress --exit-code 0 --severity HIGH,CRITICAL --format sarif -o trivy.sarif .
    - trivy fs --no-progress --exit-code 0 --severity HIGH,CRITICAL --format json -o trivy.json .
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trivy.sarif
      - trivy.json
