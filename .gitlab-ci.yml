## ---------- DEPLOY ----------

deploy-native-image:
  image: docker-repository.intern.neusta.de/tn-docker:latest
  variables:
    DOCKER_BUILDKIT: 1
  stage: deploy
  # needs: [ "unit-tests", "integration-tests" ]
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --progress=plain \
        --pull \
        --no-cache \
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" \
        -t "$CI_REGISTRY_IMAGE:latest" \
        .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  only:
    - merge_requests

scan-image-remote:
  stage: deploy
  image:
    name: aquasec/trivy:latest
    entrypoint: [ "" ]
  needs: [ "deploy-native-image" ]
  script:
    - export TRIVY_USERNAME="$CI_REGISTRY_USER"
    - export TRIVY_PASSWORD="$CI_REGISTRY_PASSWORD"

    - trivy image --image-src docker --no-progress --exit-code 1 --severity CRITICAL $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - trivy image --image-src docker --no-progress --exit-code 0 --severity HIGH,CRITICAL --format sarif -o trivy-image.sarif $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - trivy image --image-src docker --no-progress --exit-code 0 --severity HIGH,CRITICAL --format json  -o trivy-image.json  $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - trivy-image.sarif
      - trivy-image.json
  only:
    - merge_requests
