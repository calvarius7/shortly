variables:
  FRONTEND_IMAGE_NAME: "$CI_REGISTRY/$CI_PROJECT_PATH-frontend"

frontend:lint:
  image: node:20-alpine
  extends: .rules:shortly_frontend
  stage: test
  before_script:
    - apk add --no-cache git
    - cd ./shortly-frontend
    - npm ci --no-audit --no-fund
    - npm i -D \
      eslint@^9 \
      typescript  typescript-eslint \
      @typescript-eslint/parser \
      @typescript-eslint/eslint-plugin \
      @angular-eslint/eslint-plugin \
      @angular-eslint/eslint-plugin-template \
      @angular-eslint/template-parser \ || true
  script:
    - npm run lint

# ------------------------------------------
# LIGHTHOUSE JOB (Branches/MRs, ohne Backend)
# Baut das Frontend-Image lokal, startet es
# und führt Lighthouse gegen http://localhost
# ------------------------------------------
frontend:lighthouse:
  image: docker-repository.intern.neusta.de/tn-docker:latest
  extends: .rules:shortly_frontend
  stage: test
  # Optional: erst Lint, dann Lighthouse
  #  needs: [ "frontend:lint" ]
  before_script:
    - apk add --no-cache nodejs npm chromium nss curl
    - cd ./shortly-frontend
    # Lokales Build des Frontend-Images (kein Push)
    - docker build --progress=plain --pull --no-cache --provenance=false -t shortly-frontend:ci .
    # Container starten
    - docker run -d --rm -p 80:80 --name shortly-frontend-ci shortly-frontend:ci
    # Lighthouse installieren
    - npm i -g lighthouse
    # Warten bis der Container bereit ist
    - |
      for i in $(seq 1 30); do
        if curl -sSf http://localhost:80 >/dev/null 2>&1; then
          echo "Frontend ist erreichbar."; break;
        fi
        echo "Warte auf Frontend... ($i/30)"; sleep 1;
      done
  script:
    - |
      lighthouse http://localhost:80 \
        --chrome-path=/usr/bin/chromium-browser \
        --output html \
        --output-path ./lighthouse-report.html \
        --quiet \
        --chrome-flags="--headless --no-sandbox --disable-gpu"
  after_script:
    - docker logs shortly-frontend-ci || true
    - docker rm -f shortly-frontend-ci || true
  artifacts:
    when: always
    paths:
      - shortly_angular/lighthouse-report.html
    expire_in: 1 day
  allow_failure: true

# -------------------------
# DEPLOY JOB (nur Tags)
# -------------------------
frontend:deploy:
  image: docker-repository.intern.neusta.de/tn-docker:latest
  extends: .rules:shortly_frontend_deploy
  variables:
    DOCKER_BUILDKIT: "1"
  stage: deploy
  needs: [ "frontend:lint" ]
  before_script:
    - apk add --no-cache git jq curl coreutils
    - !reference [ .start_measurement, script ]
    - cd ./shortly-frontend
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --progress=plain \
        --pull \
        --no-cache \
        --provenance=false \
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" \
        -t "$CI_REGISTRY_IMAGE:latest" \
        .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  after_script:
    - !reference [ .get_measurement, script ]
    - !reference [ .display_results, script ]

frontend:scan-image-remote:
  stage: deploy
  extends: .rules:shortly_frontend_deploy
  image:
    name: aquasec/trivy:latest
    entrypoint: [ "" ]
  needs: [ "frontend:deploy" ]
  variables:
    IMAGE_REF: "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
  script:
    - export TRIVY_USERNAME="$CI_REGISTRY_USER"
    - export TRIVY_PASSWORD="$CI_REGISTRY_PASSWORD"

    # fail fast on critical vulnerabilities but ignore will_not_fix vulnerabilities e.g. CVE-2023-45853
    - trivy image --image-src docker --no-progress --ignore-unfixed --exit-code 1 --severity CRITICAL $IMAGE_REF
    - trivy image --image-src docker --no-progress --exit-code 0 --severity HIGH,CRITICAL --format sarif -o trivy-image.sarif $IMAGE_REF
    - trivy image --image-src docker --no-progress --exit-code 0 --severity HIGH,CRITICAL --format json  -o trivy-image.json  $IMAGE_REF
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - trivy-image.sarif
      - trivy-image.json
